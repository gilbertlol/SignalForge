<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Sign in · SignalForge</title></head>
  <body>
    <main>
      <h1>Sign in to SignalForge</h1>
      {% if form.errors %}<p>Invalid email or password.</p>{% endif %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Sign in</button>
      </form>
      <a href="{% url 'password_reset' %}">Forgot password?</a>
    </main>
  </body>
</html>
