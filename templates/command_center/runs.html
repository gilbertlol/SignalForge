{% extends "command_center/base.html" %}{% block title %}System Runs{% endblock %}{% block content %}
<div class="page-heading"><div><p class="eyebrow">Operations</p><h1>System runs</h1><p>Live provider execution, downstream processing, and deterministic outcomes.</p></div></div>
<div id="run-status" data-status-url="{% url 'command_center:run-status-fragment' %}">{% include "command_center/_run_status.html" %}</div>
<script>document.addEventListener("DOMContentLoaded",()=>{const root=document.getElementById("run-status");const refresh=async()=>{if(document.hidden)return;try{const response=await fetch(root.dataset.statusUrl,{headers:{"X-Requested-With":"XMLHttpRequest"}});if(response.ok)root.innerHTML=await response.text();}catch(error){} };window.setInterval(refresh,3000);});</script>
{% endblock %}
